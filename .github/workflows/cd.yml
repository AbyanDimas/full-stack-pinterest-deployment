name: Continuous Deployment (GitOps)

on:
  push:
    branches:
      - main
    paths:
      - 'k8s-manifest.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Kubernetes Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy K8s Manifest to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "k8s-manifest.yaml"
          target: "/tmp/"

      - name: Apply Manifest using kubectl
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Applying latest Kubernetes configuration..."
            kubectl apply -f /tmp/k8s-manifest.yaml
            echo "Deployment applied successfully!"
